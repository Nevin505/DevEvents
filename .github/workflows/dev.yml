name: Dev-Events CI/CD
run-name: ${{ github.actor }} is testing out GitHub Actions 🚀
on: [push]
jobs:
  Sample-Checking:
    runs-on: ubuntu-latest
    steps:
      - name: CheckOut Code
        uses: actions/checkout@v3
      - name: SSH TO EC2
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATEKEY }}
        run: |
          echo "$PRIVATE_KEY"
          mkdir -p ~/.ssh
          printf "%s" "$PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo "private_key"
           ssh -o StrictHostKeyChecking=no ec2-user@your-ec2-ip "echo Connected"
          # Your deployment commands go here
          pwd
          ls
          npm install
          npm run dev
